<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apoxy Console</title>
    <!-- Apply a stored dark choice before first paint to avoid a theme flash. -->
    <script>
      try {
        if (localStorage.getItem('apoxy.console.theme') === 'dark') document.documentElement.dataset.theme = 'dark'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
