name: Release
on:
  push:
    # Tags starting with v are used for releases (e.g v0.1.0)
    tags:
      - v**
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.18.1) — runs only the homebrew formula update"
        required: true
jobs:
  publish-images:
    if: ${{ github.event_name == 'push' }}
    runs-on: depot-ubuntu-22.04-32,dagger=0.19.10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.24"
      - name: Build and publish all images
        env:
          APOXY_DOCKERHUB_PASSWORD: ${{ secrets.APOXY_DOCKERHUB_PASSWORD }}
          APOXY_INTERNAL_GAR_CREDENTIALS: ${{ secrets.APOXY_INTERNAL_GAR_CREDENTIALS }}
          SHUTUP: 1
        timeout-minutes: 30
        run: |
          dagger call -v publish-images --src=. --tag=$GITHUB_REF_NAME --sha=${GITHUB_SHA::7} --registry-password=env:APOXY_DOCKERHUB_PASSWORD --edge-runtime-tag=38f78c0 --gcr-creds=env:APOXY_INTERNAL_GAR_CREDENTIALS

  publish-github-release:
    if: ${{ github.event_name == 'push' }}
    runs-on: depot-ubuntu-22.04-16,dagger=0.19.10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.24"
      - name: Decode Apple P12 certificate
        run: echo "${{ secrets.APPLE_P12_BASE64 }}" | base64 -d > /tmp/apple-developer-id.p12
      - name: Publish GitHub release and Helm chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APOXY_DOCKERHUB_PASSWORD: ${{ secrets.APOXY_DOCKERHUB_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          APPLE_NOTARY_KEY_JSON: ${{ secrets.APPLE_NOTARY_KEY_JSON }}
          SHUTUP: 1
        timeout-minutes: 30
        run: |
          dagger call -v publish-github-release --src=. --tag=$GITHUB_REF_NAME --github-token=env:GITHUB_TOKEN --sha=${GITHUB_SHA::7} --apple-p12=file:/tmp/apple-developer-id.p12 --apple-p12-password=env:APPLE_P12_PASSWORD --apple-notary-key=env:APPLE_NOTARY_KEY_JSON
          dagger call -v publish-helm-release --src=./deploy/helm --tag=$GITHUB_REF_NAME --registry-password=env:APOXY_DOCKERHUB_PASSWORD

  publish-homebrew-formula:
    needs: publish-github-release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.publish-github-release.result == 'success') }}
    runs-on: depot-ubuntu-22.04,dagger=0.19.10
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.24"
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          repositories: homebrew-tap
      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SHUTUP: 1
        timeout-minutes: 10
        run: |
          dagger call -v publish-homebrew-formula --tag=$RELEASE_TAG --github-token=env:GITHUB_TOKEN --homebrew-token=env:HOMEBREW_TAP_GITHUB_TOKEN
